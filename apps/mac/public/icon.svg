<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="url(#bg)"/>
  
  <!-- Cute open book -->
  <g transform="translate(256, 280)">
    <!-- Left page -->
    <path d="M -80 -60 Q -100 -40 -100 0 L -100 60 L 0 40 L 0 -80 Z" fill="#fff" opacity="0.95"/>
    <!-- Right page -->
    <path d="M 80 -60 Q 100 -40 100 0 L 100 60 L 0 40 L 0 -80 Z" fill="#fff" opacity="0.95"/>
    <!-- Book spine -->
    <rect x="-5" y="-80" width="10" height="120" fill="#4a5568"/>
    <!-- Letter marks on pages -->
    <text x="-50" y="20" font-family="Arial" font-size="40" fill="#667eea" text-anchor="middle">A</text>
    <text x="50" y="20" font-family="Arial" font-size="40" fill="#764ba2" text-anchor="middle">B</text>
  </g>
  
  <!-- Sparkles -->
  <circle cx="120" cy="120" r="15" fill="#FFD700" opacity="0.8"/>
  <circle cx="390" cy="100" r="10" fill="#FFD700" opacity="0.6"/>
  <circle cx="100" cy="380" r="8" fill="#FFD700" opacity="0.5"/>
  <circle cx="400" cy="390" r="12" fill="#FFD700" opacity="0.7"/>
</svg>

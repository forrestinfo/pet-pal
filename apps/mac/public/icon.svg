<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A9E"/>
      <stop offset="100%" style="stop-color:#FAD0C4"/>
    </linearGradient>
    <linearGradient id="ear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#FFF0F5"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="url(#bg)"/>
  
  <!-- Left ear -->
  <ellipse cx="190" cy="130" rx="40" ry="90" fill="url(#ear)" stroke="#F5C6D0" stroke-width="3"/>
  <ellipse cx="190" cy="130" rx="22" ry="65" fill="#FFB6C1"/>
  
  <!-- Right ear -->
  <ellipse cx="322" cy="130" rx="40" ry="90" fill="url(#ear)" stroke="#F5C6D0" stroke-width="3"/>
  <ellipse cx="322" cy="130" rx="22" ry="65" fill="#FFB6C1"/>
  
  <!-- Head -->
  <ellipse cx="256" cy="280" rx="130" ry="120" fill="#FFFFFF" stroke="#F5C6D0" stroke-width="3"/>
  
  <!-- Left eye -->
  <ellipse cx="210" cy="265" rx="20" ry="24" fill="#333"/>
  <ellipse cx="205" cy="258" rx="7" ry="8" fill="#FFF"/>
  <ellipse cx="215" cy="270" rx="4" ry="5" fill="#FFF" opacity="0.6"/>
  
  <!-- Right eye -->
  <ellipse cx="302" cy="265" rx="20" ry="24" fill="#333"/>
  <ellipse cx="297" cy="258" rx="7" ry="8" fill="#FFF"/>
  <ellipse cx="307" cy="270" rx="4" ry="5" fill="#FFF" opacity="0.6"/>
  
  <!-- Blush -->
  <ellipse cx="178" cy="300" rx="22" ry="14" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="334" cy="300" rx="22" ry="14" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- Nose -->
  <ellipse cx="256" cy="298" rx="10" ry="8" fill="#FF9A9E"/>
  
  <!-- Mouth -->
  <path d="M 246 306 Q 256 320 266 306" fill="none" stroke="#E8898E" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Whiskers -->
  <line x1="140" y1="290" x2="195" y2="295" stroke="#DDD" stroke-width="2" stroke-linecap="round"/>
  <line x1="140" y1="310" x2="195" y2="305" stroke="#DDD" stroke-width="2" stroke-linecap="round"/>
  <line x1="317" y1="295" x2="372" y2="290" stroke="#DDD" stroke-width="2" stroke-linecap="round"/>
  <line x1="317" y1="305" x2="372" y2="310" stroke="#DDD" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Star sparkle top-left -->
  <g transform="translate(100, 100)">
    <polygon points="0,-12 3,-4 12,-4 5,2 7,11 0,6 -7,11 -5,2 -12,-4 -3,-4" fill="#FFD700" opacity="0.8"/>
  </g>
  
  <!-- Star sparkle top-right -->
  <g transform="translate(400, 85)">
    <polygon points="0,-10 2.5,-3 10,-3 4,1.5 6,9 0,5 -6,9 -4,1.5 -10,-3 -2.5,-3" fill="#FFD700" opacity="0.7"/>
  </g>
  
  <!-- Small star bottom-right -->
  <g transform="translate(410, 410)">
    <polygon points="0,-8 2,-2.5 8,-2.5 3.5,1 5,7 0,4 -5,7 -3.5,1 -8,-2.5 -2,-2.5" fill="#FFD700" opacity="0.5"/>
  </g>
  
  <!-- Heart on body -->
  <g transform="translate(256, 395)">
    <path d="M 0 -8 C -5 -16 -18 -16 -18 -6 C -18 4 0 16 0 16 C 0 16 18 4 18 -6 C 18 -16 5 -16 0 -8 Z" fill="#FF9A9E" opacity="0.5"/>
  </g>
</svg>

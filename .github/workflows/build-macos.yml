name: Build macOS Application

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4.2.0

    - name: Setup Node.js
      uses: actions/setup-node@v4.1.0
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # Build shared packages (monorepo)
    - name: Clean all dist directories
      run: |
        rm -rf packages/shared-types/dist
        rm -rf packages/content/dist
        rm -rf packages/spaced-repetition/dist
      working-directory: .

    - name: Install npm dependencies (shared-types)
      run: npm ci
      working-directory: packages/shared-types

    - name: Build shared-types
      run: npm run build
      working-directory: packages/shared-types

    - name: Install npm dependencies (content)
      run: npm ci
      working-directory: packages/content

    - name: Debug TypeScript info
      run: |
        echo "=== Debug Info ==="
        echo "Node version: $(node --version)"
        echo "npm version: $(npm --version)"
        echo "TypeScript version in content:"
        cd packages/content
        npx tsc --version
        echo "\nTypeScript config excerpt:"
        npx tsc --showConfig | grep -A 20 -B 5 "strict\|exclude\|rootDir\|outDir"
        echo "\nCurrent directory: $(pwd)"
        echo "Files in src/words:"
        ls -la src/words/ | head -10
      working-directory: .

    - name: Build content (with full output)
      run: |
        cd packages/content
        echo "=== Building content package ==="
        npm run build 2>&1
      working-directory: .

    - name: Install npm dependencies (spaced-repetition)
      run: npm ci
      working-directory: packages/spaced-repetition

    - name: Build spaced-repetition
      run: npm run build
      working-directory: packages/spaced-repetition

    # Build Electron app (apps/mac)
    - name: Install app dependencies
      run: npm ci
      working-directory: apps/mac

    - name: Build macOS Electron app
      run: npm run build:mac
      working-directory: apps/mac

    - name: Upload macOS app artifact
      uses: actions/upload-artifact@v4
      with:
        name: PET-Pal-macOS
        path: |
          apps/mac/release/**
        retention-days: 7

    - name: Create GitHub Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          apps/mac/release/**
        draft: false
        prerelease: false
        body: |
          ## PET Pal - macOS Release

          这是通过 GitHub Actions 自动构建的 macOS 安装包/目录产物。

          ### 说明
          - 若包含 `.dmg`：直接下载并安装
          - 若是 `mac-unpacked` / `PET Pal.app`：解压后拖入「应用程序」文件夹

          首次打开如被拦截，可在「系统设置 → 隐私与安全性」选择“仍要打开”。

